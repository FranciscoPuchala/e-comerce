<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — iPlace</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-icon">iP</span>
      <span class="login-logo-label">Admin</span>
    </div>

    <h1 class="login-title">Panel de administración</h1>
    <p class="login-subtitle">Ingresá con tu cuenta de administrador</p>

    <form id="loginForm" novalidate>
      <div class="login-field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" class="login-input" placeholder="admin@iplace.com" autocomplete="username" required>
      </div>
      <div class="login-field">
        <label for="loginPassword">Contraseña</label>
        <input type="password" id="loginPassword" class="login-input" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <p class="login-error" id="loginError"></p>
      <button type="submit" class="login-btn" id="loginBtn">
        <span id="loginBtnText">Iniciar sesión</span>
      </button>
    </form>

    <p class="login-back"><a href="../index.html">← Volver a la tienda</a></p>
  </div>

  <script type="module">
    import { auth } from '../js/firebase-config.js';
    import {
      signInWithEmailAndPassword,
      onAuthStateChanged,
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    // If already logged in, redirect
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'dashboard.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');

      errEl.textContent = '';
      btn.disabled = true;
      btnText.textContent = 'Ingresando...';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        const MSGS = {
          'auth/invalid-credential': 'Email o contraseña incorrectos.',
          'auth/user-not-found': 'No existe un usuario con ese email.',
          'auth/wrong-password': 'Contraseña incorrecta.',
          'auth/too-many-requests': 'Demasiados intentos. Intentá más tarde.',
          'auth/invalid-email': 'El email no es válido.',
        };
        errEl.textContent = MSGS[err.code] ?? 'Error al iniciar sesión. Verificá tus datos.';
        btn.disabled = false;
        btnText.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
