<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — iPlace</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-icon">iP</span>
      <span class="login-logo-label">Admin</span>
    </div>

    <h1 class="login-title">Panel de administración</h1>
    <p class="login-subtitle">Ingresá con tu cuenta de administrador</p>

    <!-- Google button -->
    <button class="login-google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continuar con Google
    </button>

    <div class="login-divider"><span>o</span></div>

    <form id="loginForm" novalidate>
      <div class="login-field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" class="login-input" placeholder="admin@iplace.com" autocomplete="username" required>
      </div>
      <div class="login-field">
        <label for="loginPassword">Contraseña</label>
        <input type="password" id="loginPassword" class="login-input" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <p class="login-error" id="loginError"></p>
      <button type="submit" class="login-btn" id="loginBtn">
        <span id="loginBtnText">Iniciar sesión</span>
      </button>
    </form>

    <p class="login-back"><a href="../index.html">← Volver a la tienda</a></p>
  </div>

  <script type="module">
    import { auth } from '../js/firebase-config.js';
    import {
      signInWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged,
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    // If already logged in, redirect
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'dashboard.html';
    });

    // ---- Google sign-in ----
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const btn = document.getElementById('googleBtn');
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Conectando...';

      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
        window.location.href = 'dashboard.html';
      } catch (err) {
        const MSGS = {
          'auth/popup-closed-by-user': 'Cerraste la ventana de Google.',
          'auth/cancelled-popup-request': '',
          'auth/popup-blocked': 'Tu navegador bloqueó el popup. Permitilo e intentá de nuevo.',
        };
        errEl.textContent = MSGS[err.code] ?? 'Error al iniciar sesión con Google.';
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg> Continuar con Google`;
      }
    });

    // ---- Email/password sign-in ----
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');

      errEl.textContent = '';
      btn.disabled = true;
      btnText.textContent = 'Ingresando...';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        const MSGS = {
          'auth/invalid-credential': 'Email o contraseña incorrectos.',
          'auth/user-not-found': 'No existe un usuario con ese email.',
          'auth/wrong-password': 'Contraseña incorrecta.',
          'auth/too-many-requests': 'Demasiados intentos. Intentá más tarde.',
          'auth/invalid-email': 'El email no es válido.',
        };
        errEl.textContent = MSGS[err.code] ?? 'Error al iniciar sesión. Verificá tus datos.';
        btn.disabled = false;
        btnText.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
